            var queNumber = -1;

            function svar(thesvar){
                
                if(thesvar == posts[queNumber]["svar"]){

                    document.getElementById("rigtigt").style.display = "flex";
                    setTimeout(function(){

            }

            newQue();

            function newQue(){

                

                queNumber++;

                console.log(queNumber);
                if(queNumber == posts.length){
                    document.getElementById("done").style.display = "flex";
                    setTimeout(function(){
